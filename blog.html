<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing — David W. Ross</title>
  <meta name="description" content="Thoughts on design systems, UX engineering, product leadership, and building teams.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --indigo: #6366f1;
      --indigo-dark: #4f46e5;
      --indigo-light: #eef2ff;
      --slate-900: #0f172a;
      --slate-700: #334155;
      --slate-500: #64748b;
      --slate-300: #cbd5e1;
      --slate-100: #f1f5f9;
      --white: #ffffff;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; color: var(--slate-700); background: var(--white); line-height: 1.6; }

    /* ── NAV ── */
    nav.site-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      background: rgba(15,23,42,0.97); backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem;
    }
    .nav-back { display: flex; align-items: center; gap: .5rem; color: rgba(255,255,255,0.7); text-decoration: none; font-size: .875rem; font-weight: 500; transition: color .2s; }
    .nav-back:hover { color: var(--white); }
    .nav-logo { color: var(--white); font-weight: 700; font-size: 1rem; text-decoration: none; }
    .nav-cta { background: var(--indigo); color: var(--white); padding: .45rem 1.1rem; border-radius: .375rem; font-size: .8rem; font-weight: 600; text-decoration: none; transition: background .2s; }
    .nav-cta:hover { background: var(--indigo-dark); }

    /* ── HEADER ── */
    .blog-header { background: var(--slate-900); padding: 6rem 1.5rem 3.5rem; text-align: center; }
    .blog-header .eyebrow { font-size: .75rem; font-weight: 700; color: var(--indigo); text-transform: uppercase; letter-spacing: .1em; margin-bottom: .75rem; }
    .blog-header h1 { font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 700; color: var(--white); margin-bottom: .75rem; letter-spacing: -0.02em; }
    .blog-header p { color: #94a3b8; font-size: 1rem; max-width: 480px; margin: 0 auto; }

    /* ── POSTS LIST ── */
    .posts-container { max-width: 740px; margin: 0 auto; padding: 3.5rem 1.5rem 5rem; }

    /* Loading / empty state */
    .state-msg { text-align: center; padding: 4rem 0; color: var(--slate-500); font-size: .95rem; }
    .state-msg .icon { font-size: 2rem; margin-bottom: 1rem; display: block; }

    /* Individual post card */
    .post-card {
      border-bottom: 1px solid var(--slate-100);
      padding: 2.5rem 0;
    }
    .post-card:first-child { padding-top: 0; }
    .post-card:last-child { border-bottom: none; }

    .post-meta { display: flex; align-items: center; gap: .75rem; margin-bottom: .75rem; flex-wrap: wrap; }
    .post-date { font-size: .78rem; color: var(--slate-500); font-weight: 500; }

    .post-title { font-size: 1.3rem; font-weight: 700; color: var(--slate-900); line-height: 1.3; margin-bottom: 1rem; cursor: pointer; }
    .post-title:hover { color: var(--indigo); }

    .post-body { font-size: .975rem; color: var(--slate-700); line-height: 1.8; }
    .post-body p { margin-bottom: 1rem; }
    .post-body p:last-child { margin-bottom: 0; }

    .post-tags { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: 1.25rem; }
    .post-tag { font-size: .7rem; font-weight: 600; padding: .25rem .65rem; border-radius: 999px; background: var(--slate-100); color: var(--slate-500); text-transform: lowercase; }

    /* Expand/collapse toggle */
    .post-toggle { display: inline-flex; align-items: center; gap: .4rem; margin-top: 1rem; font-size: .82rem; font-weight: 600; color: var(--indigo); cursor: pointer; border: none; background: none; padding: 0; transition: color .2s; }
    .post-toggle:hover { color: var(--indigo-dark); }
    .post-collapsed .post-full { display: none; }
    .post-collapsed .post-excerpt { display: block; }
    .post-expanded .post-full { display: block; }
    .post-expanded .post-excerpt { display: none; }

    /* ── FOOTER ── */
    .blog-footer { background: var(--slate-900); padding: 2.5rem 1.5rem; text-align: center; }
    .blog-footer p { color: #475569; font-size: .85rem; }
    .blog-footer a { color: var(--indigo); text-decoration: none; }
    .blog-footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .post-title { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-back">
    <i class="fa fa-arrow-left" style="font-size:.75rem;"></i> Back to portfolio
  </a>
  <a href="index.html" class="nav-logo">DR</a>
  <a href="index.html#contact" class="nav-cta">Get in touch</a>
</nav>

<div class="blog-header">
  <div class="eyebrow">Writing</div>
  <h1>Thoughts on design, engineering &amp; leadership</h1>
  <p>Short takes on building products, leading teams, and closing the gap between design and code.</p>
</div>

<div class="posts-container" id="posts-container">
  <div class="state-msg" id="loading-state">
    <span class="icon"><i class="fa fa-circle-notch fa-spin"></i></span>
    Loading posts…
  </div>
</div>

<div class="blog-footer">
  <p>Want to reach out? <a href="index.html#contact">Drop me a line</a> or find me on <a href="https://www.linkedin.com/in/daveross858" target="_blank" rel="noopener">LinkedIn</a>.</p>
</div>

<script>
(function() {

  function formatDate(dateStr) {
    var d = new Date(dateStr);
    if (isNaN(d.getTime())) d = new Date(dateStr + 'T00:00:00');
    if (isNaN(d.getTime())) return dateStr;
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function inlineFormat(text) {
    return escapeHtml(text).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  }

  function nl2p(text) {
    return text.split(/\n\n+/).map(function(para) {
      return '<p>' + inlineFormat(para).replace(/\n/g, '<br>') + '</p>';
    }).join('');
  }

  function renderPost(post, index) {
    var isLong = post.content.length > 400;
    var excerpt = isLong ? post.content.substring(0, 380).trim() + '…' : post.content;
    var tags = (post.tags || []).map(function(t) { return '<span class="post-tag">' + t + '</span>'; }).join('');

    var card = document.createElement('article');
    card.className = 'post-card ' + (isLong ? 'post-collapsed' : 'post-expanded');
    card.setAttribute('data-id', post.id);

    card.innerHTML =
      (post.date ? '<div class="post-meta"><span class="post-date">' + formatDate(post.date) + '</span></div>' : '') +
      '<div class="post-title">' + escapeHtml(post.title) + '</div>' +
      '<div class="post-body">' +
        '<div class="post-excerpt">' + nl2p(excerpt) + '</div>' +
        '<div class="post-full">' + nl2p(post.content) + '</div>' +
      '</div>' +
      (tags ? '<div class="post-tags">' + tags + '</div>' : '') +
      (isLong ?
        '<button class="post-toggle">' +
          '<i class="fa fa-chevron-down" style="font-size:.65rem;"></i> Read more' +
        '</button>' : '');

    if (isLong) {
      var toggle = card.querySelector('.post-toggle');
      toggle.addEventListener('click', function() {
        var expanded = card.classList.contains('post-expanded');
        card.classList.toggle('post-expanded', !expanded);
        card.classList.toggle('post-collapsed', expanded);
        toggle.innerHTML = expanded
          ? '<i class="fa fa-chevron-down" style="font-size:.65rem;"></i> Read more'
          : '<i class="fa fa-chevron-up" style="font-size:.65rem;"></i> Show less';
      });
    }

    return card;
  }

  function renderPosts(data) {
    var container = document.getElementById('posts-container');
    container.innerHTML = '';

    var posts = (data.posts || []).slice();
    if (posts.length && posts[0].date) {
      posts.sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
    }

    if (posts.length === 0) {
      container.innerHTML = '<div class="state-msg"><span class="icon"><i class="fa fa-pen-to-square"></i></span>No posts yet — check back soon.</div>';
      return;
    }

    posts.forEach(function(post, i) {
      container.appendChild(renderPost(post, i));
    });
  }

  var SHEET_ID = '1E09XNuIEmBSwqpu2Y1fecux9S5FLQTuGgW7TsXoLk7k';
  var SHEET_TAB = 'LinkedIn Posts';
  var SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
    '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(SHEET_TAB);

  // Minimal RFC4180 CSV parser: handles quoted fields, embedded commas/newlines, escaped quotes.
  function parseCSV(text) {
    var rows = [], row = [], field = '', inQuotes = false;
    for (var i = 0; i < text.length; i++) {
      var c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') { field += '"'; i++; }
          else { inQuotes = false; }
        } else {
          field += c;
        }
      } else {
        if (c === '"') { inQuotes = true; }
        else if (c === ',') { row.push(field); field = ''; }
        else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
        else { field += c; }
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  function csvToPosts(text) {
    var rows = parseCSV(text.replace(/\r\n/g, '\n').replace(/\r/g, '\n'));
    if (!rows.length) return [];

    var headers = rows[0];
    var idx = {};
    headers.forEach(function(h, i) { idx[h.trim()] = i; });

    var posts = rows.slice(1)
      .filter(function(r) { return r.some(function(c) { return c && c.trim(); }); })
      .map(function(r, i) {
        var title = (r[idx['Title']] || '').trim();
        var content = (r[idx['Content']] || '').trim();
        var hashtagsRaw = (r[idx['Hashtags']] || '').trim();
        var date = (r[idx['Date']] || '').trim();
        if (!date) {
          // Fall back to the image-generation timestamp embedded in the URL columns (st=YYYY-MM-DD...)
          var urlField = (r[idx['url']] || '') + ' ' + (r[idx['Image URL']] || '');
          var m = urlField.match(/st=(\d{4}-\d{2}-\d{2})/);
          if (m) date = m[1];
        }
        var tags = hashtagsRaw.split(/\s+/).filter(Boolean).map(function(t) {
          return t.replace(/^#/, '');
        });
        return {
          id: 'row-' + (i + 2),
          title: title,
          content: content,
          tags: tags,
          date: date
        };
      })
      .filter(function(p) { return p.title && p.content; });

    posts.reverse(); // sheet rows are appended oldest-first; show newest first
    return posts;
  }

  fetch(SHEET_CSV_URL + '&_=' + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error('Failed to load posts');
      return r.text();
    })
    .then(function(text) { renderPosts({ posts: csvToPosts(text) }); })
    .catch(function() {
      document.getElementById('posts-container').innerHTML =
        '<div class="state-msg"><span class="icon"><i class="fa fa-triangle-exclamation"></i></span>Couldn\'t load posts right now. Try refreshing.</div>';
    });

})();
</script>

</body>
</html>
